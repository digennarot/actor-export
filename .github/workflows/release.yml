name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        run: |
          zip -r actor-export.zip \
            --exclude ".*" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "*.md" \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            actor-export.zip
            module.json
          body: |
            # Actor Export v${{ steps.get_version.outputs.VERSION }}
            
            Foundry VTT v14 compatible release.
            
            For more details, see [CHANGELOG.md](CHANGELOG.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
